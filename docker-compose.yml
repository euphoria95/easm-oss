# =============================================================================
# EASM Pipeline - Docker Compose
# =============================================================================
# One-click deployment:
#   docker compose up -d --build        # build & start dashboard
#   open http://127.0.0.1:9990          # configure stages, enter targets, scan
#   docker compose down                 # stop everything
#
# Optional CLI / utility services (profiles):
#   docker compose --profile cli run --rm easm-pipeline -- --stage dns
#   docker compose --profile gallery up gowitness
#   docker compose --profile query run --rm duckdb
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # EASM Dashboard — primary service, builds the shared image
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNTIME_BASE: ${RUNTIME_BASE:-debian:bookworm-slim}
    image: easm-pipeline:local
    container_name: easm-dashboard
    entrypoint: ["python3", "-m", "uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8443"]
    environment:
      - EASM_DB_PATH=/easm/data/output/easm.duckdb
      - DASHBOARD_PORT=8443
    ports:
      - "127.0.0.1:9990:8443"
    volumes:
      - ./data:/easm/data
      - ./dashboard:/easm/dashboard:ro
      - ./scripts:/easm/scripts:ro
      - ./run.sh:/easm/run.sh:ro
      - ./config:/easm/config:ro
      - ./logs:/easm/logs
    cap_add:
      - NET_ADMIN
      - NET_RAW
    shm_size: "2gb"
    networks:
      - easm-net

  # -------------------------------------------------------------------------
  # CLI pipeline runner (reuses dashboard image)
  # -------------------------------------------------------------------------
  easm-pipeline:
    image: easm-pipeline:local
    container_name: easm-pipeline
    env_file:
      - config/pipeline.env
    volumes:
      - ./data:/easm/data
      - ./logs:/easm/logs
      - ./config:/easm/config:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    shm_size: "2gb"
    networks:
      - easm-net
    profiles:
      - cli

  # -------------------------------------------------------------------------
  # gowitness v3 - screenshot gallery & API
  # -------------------------------------------------------------------------
  gowitness:
    image: easm-pipeline:local
    container_name: easm-gowitness
    entrypoint: ["gowitness"]
    command:
      - "report"
      - "server"
      - "--db-uri"
      - "sqlite:///easm/data/output/gowitness.sqlite3"
      - "--screenshot-path"
      - "/easm/data/screenshots"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "7171"
    ports:
      - "7171:7171"
    volumes:
      - ./data:/easm/data
    networks:
      - easm-net
    profiles:
      - gallery

  # -------------------------------------------------------------------------
  # DuckDB CLI for ad-hoc queries
  # -------------------------------------------------------------------------
  duckdb:
    image: easm-pipeline:local
    container_name: easm-duckdb
    entrypoint: ["python3", "-c", "import duckdb; db = duckdb.connect('/easm/data/output/easm.duckdb'); print('DuckDB connected. Use db.sql() to query.'); import code; code.interact(local=locals())"]
    volumes:
      - ./data:/easm/data
    networks:
      - easm-net
    profiles:
      - query

networks:
  easm-net:
    driver: bridge
