# =============================================================================
# EASM Pipeline - Docker Compose
# =============================================================================
# Usage:
#   docker compose --profile pipeline build
#   docker compose --profile pipeline run --rm easm-pipeline                           # full pipeline
#   docker compose --profile pipeline run --rm easm-pipeline -- --stage dns            # single stage
#   docker compose --profile pipeline run --rm easm-pipeline -- --stage dns,ports      # multiple stages
#   docker compose --profile pipeline run --rm easm-pipeline -- --from tls             # resume from TLS onwards
#   docker compose --profile pipeline run --rm easm-pipeline -- --from normalize       # re-run normalize + load only
#   docker compose --profile pipeline run --rm easm-pipeline -- --dry-run --from tls   # preview what would run
#   docker compose --profile gallery up gowitness                                       # screenshot gallery
#   docker compose --profile dashboard up dashboard                                     # web dashboard (port 8443)
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # Main EASM pipeline runner
  # -------------------------------------------------------------------------
  easm-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNTIME_BASE: ${RUNTIME_BASE:-debian:bookworm-slim}
    container_name: easm-pipeline
    env_file:
      - config/pipeline.env
    volumes:
      - ./data:/easm/data
      - ./logs:/easm/logs
      - ./config:/easm/config:ro
    # SYN scanning requires NET_ADMIN + NET_RAW
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Chromium needs /dev/shm
    shm_size: "2gb"
    networks:
      - easm-net
    profiles:
      - pipeline

  # -------------------------------------------------------------------------
  # gowitness v3 - screenshot gallery & API
  # -------------------------------------------------------------------------
  gowitness:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNTIME_BASE: ${RUNTIME_BASE:-debian:bookworm-slim}
    container_name: easm-gowitness
    entrypoint: ["gowitness"]
    command:
      - "report"
      - "server"
      - "--db-uri"
      - "sqlite:///easm/data/output/gowitness.sqlite3"
      - "--screenshot-path"
      - "/easm/data/screenshots"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "7171"
    ports:
      - "7171:7171"
    volumes:
      - ./data:/easm/data
    networks:
      - easm-net
    profiles:
      - gallery

  # -------------------------------------------------------------------------
  # EASM Dashboard — Web UI for scan results
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNTIME_BASE: ${RUNTIME_BASE:-debian:bookworm-slim}
    container_name: easm-dashboard
    entrypoint: ["python3", "-m", "uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8443"]
    environment:
      - EASM_DB_PATH=/easm/data/output/easm.duckdb
      - DASHBOARD_PORT=8443
    ports:
      - "8443:8443"
    volumes:
      - ./data:/easm/data
      - ./dashboard:/easm/dashboard:ro
      - ./scripts:/easm/scripts:ro
      - ./run.sh:/easm/run.sh:ro
      - ./config:/easm/config:ro
      - ./logs:/easm/logs
    cap_add:
      - NET_ADMIN
      - NET_RAW
    shm_size: "2gb"
    networks:
      - easm-net
    profiles:
      - dashboard

  # -------------------------------------------------------------------------
  # DuckDB CLI for ad-hoc queries
  # -------------------------------------------------------------------------
  duckdb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNTIME_BASE: ${RUNTIME_BASE:-debian:bookworm-slim}
    container_name: easm-duckdb
    entrypoint: ["python3", "-c", "import duckdb; db = duckdb.connect('/easm/data/output/easm.duckdb'); print('DuckDB connected. Use db.sql() to query.'); import code; code.interact(local=locals())"]
    volumes:
      - ./data:/easm/data
    networks:
      - easm-net
    profiles:
      - query

networks:
  easm-net:
    driver: bridge
