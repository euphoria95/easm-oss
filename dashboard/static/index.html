<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASM Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        surface: {
                            DEFAULT: '#111827',
                            light: '#1e293b',
                            hover: '#1f2937',
                            border: '#2d3a4f',
                        },
                        accent: {
                            DEFAULT: '#06b6d4',
                            light: '#22d3ee',
                            dim: '#0e7490',
                        },
                        severity: {
                            critical: '#ef4444',
                            high: '#f97316',
                            medium: '#eab308',
                            low: '#3b82f6',
                            info: '#6b7280',
                        },
                    },
                },
            },
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-[#060a14] text-slate-200 font-sans antialiased min-h-screen">
    <div id="app" class="flex min-h-screen">
        <div class="flex items-center justify-center w-full h-screen">
            <div class="flex flex-col items-center gap-4">
                <div class="w-10 h-10 border-2 border-accent/30 border-t-accent rounded-full animate-spin"></div>
                <span class="text-slate-400 text-sm">Loading EASM Dashboard...</span>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=6"></script>
</body>
</html>
